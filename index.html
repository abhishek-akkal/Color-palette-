<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Color Palette</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navbar of the page  -->
    <nav>

        <div class="nav-left">
            <!-- Navbar logo  -->
            <div class="logo">
                <img src="images/logo.png" alt="">
            </div>

            <!-- Left side navbar media section -->
            <div class="left-media">
                <!-- Navbar name and follow -->
                <div class="name-follow">
                    <p class="name">Abhishek</p>
                    <div>
                        <p class="follow-plus">+</p>
                        <p class="follow">Follow</p>
                    </div>

                </div>

                <!-- Navbar project color palette -->
                <div class="nav-pro">
                    <p>Color Palette</p>
                </div>
            </div>

        </div>

        <!-- Right side of the navbar  -->
        <div class="right-nav">

            <!-- Right side navbar heart  -->
            <div class="nav-heart">
                <i id="heartIcon" class="fa-regular fa-heart"></i>
            </div>

            <!-- Right side navbar source code  -->
            <div class="source-code">
                <p>View SourceCode</p>
            </div>

            <!-- Right side navbar Sign Up  -->
            <div class="nav-sign-up">
                <p>Sign Up</p>
            </div>

            <!-- Right side navbar log in  -->
            <div class="nav-log-in">
                <p>Log In</p>
            </div>
        </div>
    </nav>

    <!-- Main content section  -->
    <main>

        <!-- Main content images -->
        <div class="main-img">

            <div class="top-images">
                <!-- Image one  -->
                <div class="palette-img">
                    <img src="images/image-one.png" alt="Ocean">

                    <!-- img color one  -->
                    <div class="box-one">
                        <p>#F4F4F2</p>
                    </div>

                    <!-- img color two  -->
                    <div class="box-two">
                        <p>#F56B1F</p>
                    </div>

                    <!-- img color three  -->
                    <div class="box-three">
                        <p>#32B7E4</p>
                    </div>

                    <!-- img color four  -->
                    <div class="box-four">
                        <p>#0D6C95</p>
                    </div>

                    <!-- img color five  -->
                    <div class="box-five">
                        <p>#01152B</p>
                    </div>

                </div>


                <!-- Image two  -->
                <div class="palette-img">
                    <img src="images/image-two.png" alt="Mountain">

                    <!-- img color one  -->
                    <div class="box-two-one">
                        <p>#F8B6D2</p>
                    </div>

                    <!-- img color two  -->
                    <div class="box-two-two">
                        <p>#E47AAE</p>
                    </div>

                    <!-- img color three  -->
                    <div class="box-two-three">
                        <p>#A56CC1</p>
                    </div>

                    <!-- img color four  -->
                    <div class="box-two-four">
                        <p>#5B3B8C</p>
                    </div>

                    <!-- img color five  -->
                    <div class="box-two-five">
                        <p>#1E1633</p>
                    </div>
                </div>
            </div>

        </div>

        <!-- Main bottom side image  -->
        <div class="bottom-img">
            <!-- Image three -->
            <div class="palette-img">
                <img src="images/image-three.png" alt="Image three">

                <div class="box-three-one">
                    <p>#D8B6D4</p>
                </div>

                <div class="box-three-two">
                    <p>#0A3D91</p>
                </div>

                <div class="box-three-three">
                    <p>#6FCBFF</p>
                </div>

                <div class="box-three-four">
                    <p>#F2A23A</p>
                </div>
            </div>

            <!-- Image three -->
            <div class="palette-img">
                <img src="images/image-four.png" alt="Mountain Lake">

                <div class="box-four-one">
                    <p>#DDF6FF</p>
                </div>

                <div class="box-four-two">
                    <p>#5CC8D7</p>
                </div>

                <div class="box-four-three">
                    <p>#0E7490 </p>
                </div>

                <div class="box-four-four">
                    <p>#F59E0B </p>
                </div>

                <div class="box-four-five">
                    <p>#3B2F2F</p>
                </div>
            </div>

        </div>
    </main>


    <script src="app.js"></script>
</body>

</html>
